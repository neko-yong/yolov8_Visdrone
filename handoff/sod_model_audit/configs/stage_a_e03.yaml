# Stage A smoke test: E03 full SOD
experiment:
  id: E03
  name: E03_full_sod_smoke_5ep_b2
  type: sod

data:
  dataset: VisDrone2019-DET
  format: YOLO
  config: configs/visdrone.yaml

model:
  backbone: YOLOv8s
  neck: GFPN-lite
  head: P2 + P3 + P4 + P5
  attention: C2f-EMA
  loss: PIoU

train:
  model: models/yolov8s_gfpn_lite.yaml
  imgsz: 640
  epochs: 5
  batch: 2
  optimizer: SGD
  lr0: 0.005
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 5
  augment: default

output:
  project: runs/sod
  name: E03_full_sod_smoke_5ep_b2
  policy: 遵循 RUNS_POLICY.md，Stage A smoke test 独立输出
