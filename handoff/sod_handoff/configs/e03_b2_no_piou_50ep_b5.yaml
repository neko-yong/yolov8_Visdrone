# Stage B2: E03 full SOD without PIoU
experiment:
  id: E03
  name: E03_no_piou_50ep_b5
  type: sod

data:
  dataset: VisDrone2019-DET
  format: YOLO
  config: configs/visdrone.yaml

model:
  backbone: YOLOv8s
  neck: GFPN-lite
  head: P2 + P3 + P4 + P5
  attention: C2f-EMA
  loss: default

train:
  model: models/yolov8s_gfpn_lite.yaml
  imgsz: 640
  epochs: 50
  batch: 5
  optimizer: SGD
  lr0: 0.005
  momentum: 0.937
  weight_decay: 0.0005
  augment: default

output:
  project: runs/sod
  name: E03_no_piou_50ep_b5
  policy: Stage B2 PIoU 消融对照，结构不变，仅关闭 PIoU 注册
