# Stage B2: E03 full SOD with batch=8
experiment:
  id: E03
  name: E03_batch8_full_50ep
  type: sod

data:
  dataset: VisDrone2019-DET
  format: YOLO
  config: configs/visdrone.yaml

model:
  backbone: YOLOv8s
  neck: GFPN-lite
  head: P2 + P3 + P4 + P5
  attention: C2f-EMA
  loss: PIoU

train:
  model: models/yolov8s_gfpn_lite.yaml
  imgsz: 640
  epochs: 50
  batch: 8
  optimizer: SGD
  lr0: 0.005
  momentum: 0.937
  weight_decay: 0.0005
  workers: 0
  cache: true
  device: 0
  augment: default

output:
  project: runs/sod
  name: E03_batch8_full_50ep
  policy: Stage B2 batch 对照，结构与 PIoU 不变，仅统一 batch=8
