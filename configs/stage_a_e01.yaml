# Stage A smoke test: E01 P2 detection head
experiment:
  id: E01
  name: E01_p2_smoke_5ep_b4
  type: ablation

data:
  dataset: VisDrone2019-DET
  format: YOLO
  config: configs/visdrone.yaml

model:
  backbone: YOLOv8s
  neck: YOLOv8 PAN-FPN
  head: P2 + P3 + P4 + P5
  loss: default

train:
  model: models/yolov8s_p2.yaml
  imgsz: 640
  epochs: 5
  batch: 4
  optimizer: default
  augment: default

output:
  project: runs/ablation
  name: E01_p2_smoke_5ep_b4
  policy: 遵循 RUNS_POLICY.md，Stage A smoke test 独立输出
