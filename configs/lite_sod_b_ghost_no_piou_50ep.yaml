# Lite-SOD-B: Lite-SOD-A + selected GhostConv, no PIoU, 50 epoch formal training.
experiment:
  id: E21
  name: E21_Lite-SOD-B_ghost_no_piou_50ep
  type: sod

data:
  dataset: VisDrone2019-DET
  format: YOLO
  config: configs/visdrone.yaml

model:
  backbone: YOLOv8s
  neck: GFPN-lite uniform compressed + selected GhostConv
  head: P2 + P3 + P4 + P5
  attention: C2f-EMA
  loss: default
  note: Lite-SOD-B formal 50 epoch training, GhostConv layers 14/19/20/23/24/27, no PIoU

train:
  model: models/yolov8s_lite_sod_b_ghost.yaml
  imgsz: 640
  epochs: 50
  batch: 8
  optimizer: SGD
  lr0: 0.005
  momentum: 0.937
  weight_decay: 0.0005
  workers: 0
  cache: true
  device: 0
  augment: default

output:
  project: runs/sod
  name: E21_Lite-SOD-B_ghost_no_piou_50ep
  policy: Lite-SOD-B formal training, independent output, no PIoU
